name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
      platform:
        description: 'Platform to build'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - linux
          - both

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        run: gh release create "v${{ github.event.inputs.version }}" --title "v${{ github.event.inputs.version }}" --draft --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'both' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Set version
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Show package.json version
        run: node -e "console.log(require('./package.json').version)"

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder

  build-linux:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set version
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Linux)
        run: npm run release:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
