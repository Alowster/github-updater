name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
      platform:
        description: 'Platform to build'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - linux
          - both

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'both' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    if: ${{ inputs.platform == 'linux' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Linux)
        run: npm run release:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
